<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Đề Thi Thử Toán THPT 2026 - Sát Cấu Trúc Chuẩn</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Source+Serif+4:ital,wght@0,300;0,400;0,600;1,400&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0b0e1a;
  --surface: #111526;
  --card: #161b2e;
  --border: #232a42;
  --accent: #e8b84b;
  --accent2: #4b9ee8;
  --accent3: #e84b7a;
  --text: #e8e6df;
  --muted: #8a8fa8;
  --correct: #4be87a;
  --wrong: #e84b4b;
  --ds-true: #4be87a;
  --ds-false: #e84b4b;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Source Serif 4', serif;
  min-height: 100vh;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed; inset: 0;
  background: radial-gradient(ellipse 80% 50% at 20% 10%, rgba(232,184,75,0.06) 0%, transparent 60%),
              radial-gradient(ellipse 60% 40% at 80% 90%, rgba(75,158,232,0.05) 0%, transparent 60%);
  pointer-events: none; z-index: 0;
}

header {
  position: sticky; top: 0; z-index: 100;
  background: rgba(11,14,26,0.92);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
  padding: 0 2rem;
}
.header-inner {
  max-width: 1200px; margin: auto;
  display: flex; align-items: center; justify-content: space-between;
  height: 64px; gap: 1.5rem;
}
.logo {
  font-family: 'Playfair Display', serif;
  font-size: 1.25rem; font-weight: 900;
  color: var(--accent);
  letter-spacing: -0.5px;
  white-space: nowrap;
}
.logo span { color: var(--text); }
nav { display: flex; gap: 0.5rem; flex-wrap: wrap; }
nav button {
  background: transparent;
  border: 1px solid transparent;
  color: var(--muted);
  font-family: 'Source Serif 4', serif;
  font-size: 0.8rem;
  padding: 0.35rem 0.8rem;
  border-radius: 20px;
  cursor: pointer;
  transition: all 0.2s;
}
nav button:hover, nav button.active {
  border-color: var(--accent);
  color: var(--accent);
  background: rgba(232,184,75,0.08);
}
.score-badge {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.85rem;
  background: rgba(232,184,75,0.12);
  border: 1px solid rgba(232,184,75,0.3);
  color: var(--accent);
  padding: 0.3rem 0.8rem;
  border-radius: 20px;
  white-space: nowrap;
}

.hero {
  position: relative; z-index: 1;
  padding: 3rem 2rem 2rem;
  max-width: 1200px; margin: auto;
}
.hero h1 {
  font-family: 'Playfair Display', serif;
  font-size: clamp(1.8rem, 4vw, 2.8rem);
  font-weight: 900;
  line-height: 1.15;
  margin-bottom: 0.5rem;
}
.hero h1 em { color: var(--accent); font-style: normal; }
.hero p {
  color: var(--muted);
  font-size: 0.95rem;
  margin-bottom: 2rem;
}

.de-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
  gap: 1rem;
  margin-bottom: 2rem;
}
.de-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 1.2rem;
  cursor: pointer;
  transition: all 0.25s;
  position: relative;
  overflow: hidden;
}
.de-card::before {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(135deg, transparent 60%, rgba(232,184,75,0.04));
  opacity: 0; transition: opacity 0.25s;
}
.de-card:hover { border-color: var(--accent); transform: translateY(-2px); }
.de-card:hover::before { opacity: 1; }
.de-card.active {
  border-color: var(--accent);
  background: rgba(232,184,75,0.08);
  box-shadow: 0 0 0 1px var(--accent);
}
.de-card-num {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.7rem; color: var(--accent);
  letter-spacing: 1px; text-transform: uppercase;
  margin-bottom: 0.3rem;
}
.de-card-name {
  font-size: 0.95rem; font-weight: 600;
  margin-bottom: 0.25rem;
}
.de-card-meta { font-size: 0.78rem; color: var(--muted); }
.de-card-progress {
  height: 3px; background: var(--border);
  border-radius: 2px; margin-top: 0.8rem;
}
.de-card-progress-fill {
  height: 100%; border-radius: 2px;
  background: var(--accent);
  transition: width 0.4s;
}
.de-badge {
  display: inline-block;
  font-size: 0.65rem; font-family: 'JetBrains Mono', monospace;
  padding: 0.15rem 0.5rem; border-radius: 4px;
  margin-top: 0.5rem;
}
.badge-official { background: rgba(232,184,75,0.15); color: var(--accent); }
.badge-so { background: rgba(75,158,232,0.15); color: var(--accent2); }
.badge-thu { background: rgba(232,75,122,0.15); color: var(--accent3); }

.exam-area {
  max-width: 860px; margin: 0 auto;
  padding: 0 2rem 4rem;
  position: relative; z-index: 1;
}

.exam-header {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 2rem;
  margin-bottom: 2rem;
  text-align: center;
  position: relative;
}
.exam-header::before {
  content: '';
  position: absolute; top: 0; left: 50%; transform: translateX(-50%);
  width: 80px; height: 3px;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  border-radius: 0 0 4px 4px;
}
.exam-header .ministry {
  font-size: 0.8rem; color: var(--muted);
  text-transform: uppercase; letter-spacing: 2px;
  margin-bottom: 0.5rem;
}
.exam-header h2 {
  font-family: 'Playfair Display', serif;
  font-size: 1.4rem; font-weight: 900;
  color: var(--accent);
  margin-bottom: 0.25rem;
}
.subtitle { font-size: 0.9rem; color: var(--muted); }
.ma-de-box {
  display: inline-block;
  font-family: 'JetBrains Mono', monospace;
  font-size: 1.1rem; font-weight: 600;
  background: rgba(232,184,75,0.12);
  border: 1px solid rgba(232,184,75,0.3);
  color: var(--accent);
  padding: 0.3rem 1rem; border-radius: 8px;
  margin-top: 0.8rem;
}
.exam-info {
  display: flex; justify-content: center; gap: 2rem;
  margin-top: 1rem; flex-wrap: wrap;
}
.exam-info span {
  font-size: 0.8rem; color: var(--muted);
}
.exam-info span strong { color: var(--text); }

.phan-header {
  display: flex; align-items: center; gap: 1rem;
  margin: 2.5rem 0 1.5rem;
}
.phan-num {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.7rem; font-weight: 600;
  letter-spacing: 2px; color: var(--accent);
  text-transform: uppercase;
  background: rgba(232,184,75,0.1);
  border: 1px solid rgba(232,184,75,0.25);
  padding: 0.3rem 0.8rem; border-radius: 4px;
  white-space: nowrap;
}
.phan-title { font-size: 1rem; font-weight: 600; color: var(--text); }
.phan-desc { font-size: 0.82rem; color: var(--muted); }
.phan-line { flex: 1; height: 1px; background: var(--border); }

.question-block {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 1.5rem;
  margin-bottom: 1.2rem;
  transition: border-color 0.2s;
}
.question-block:hover { border-color: rgba(232,184,75,0.2); }
.question-block.answered { border-color: rgba(75,232,122,0.2); }

.q-num {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.7rem; color: var(--muted);
  letter-spacing: 1px; margin-bottom: 0.6rem;
}
.q-text {
  font-size: 0.97rem; line-height: 1.65;
  margin-bottom: 1rem;
  color: var(--text);
}
.q-text .math {
  font-family: 'JetBrains Mono', monospace;
  background: rgba(255,255,255,0.04);
  padding: 0.1rem 0.35rem; border-radius: 4px;
  font-size: 0.9em;
}

.options {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0.6rem;
}
.option {
  display: flex; align-items: center; gap: 0.75rem;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 0.7rem 1rem;
  cursor: pointer;
  transition: all 0.18s;
  font-size: 0.9rem;
}
.option:hover { border-color: var(--accent); background: rgba(232,184,75,0.05); }
.option.selected { border-color: var(--accent2); background: rgba(75,158,232,0.1); }
.option.correct { border-color: var(--correct); background: rgba(75,232,122,0.08); }
.option.incorrect { border-color: var(--wrong); background: rgba(232,75,75,0.08); }
.option-letter {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.78rem; font-weight: 600;
  color: var(--accent);
  min-width: 18px;
}
.option.correct .option-letter { color: var(--correct); }
.option.incorrect .option-letter { color: var(--wrong); }

.ds-table {
  width: 100%;
  border-collapse: separate;
  border-spacing: 0 0.5rem;
  margin-top: 0.5rem;
}
.ds-row { display: grid; grid-template-columns: 1fr auto auto; gap: 0.75rem; align-items: start; }
.ds-text { font-size: 0.9rem; line-height: 1.5; padding: 0.6rem 0; }
.ds-btns { display: flex; gap: 0.4rem; }
.ds-btn {
  padding: 0.35rem 0.8rem;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--muted);
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.75rem; font-weight: 600;
  cursor: pointer;
  transition: all 0.18s;
}
.ds-btn:hover { border-color: var(--muted); color: var(--text); }
.ds-btn.true-sel { border-color: var(--ds-true); background: rgba(75,232,122,0.1); color: var(--ds-true); }
.ds-btn.false-sel { border-color: var(--ds-false); background: rgba(232,75,75,0.1); color: var(--ds-false); }
.ds-btn.reveal-correct { border-color: var(--correct); color: var(--correct); }
.ds-btn.reveal-wrong { border-color: var(--wrong); color: var(--wrong); }
.ds-sep { height: 1px; background: var(--border); margin: 0.5rem 0; }

.short-answer-wrap { margin-top: 0.75rem; display: flex; gap: 0.75rem; align-items: center; flex-wrap: wrap; }
.short-input {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 0.6rem 1rem;
  color: var(--text);
  font-family: 'JetBrains Mono', monospace;
  font-size: 1rem;
  width: 200px;
  transition: border-color 0.2s;
}
.short-input:focus { outline: none; border-color: var(--accent); }
.short-input.correct-input { border-color: var(--correct); background: rgba(75,232,122,0.08); }
.short-input.wrong-input { border-color: var(--wrong); background: rgba(232,75,75,0.08); }
.check-btn {
  background: rgba(232,184,75,0.12);
  border: 1px solid rgba(232,184,75,0.35);
  color: var(--accent);
  font-family: 'Source Serif 4', serif;
  font-size: 0.85rem;
  padding: 0.6rem 1.2rem;
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.2s;
}
.check-btn:hover { background: rgba(232,184,75,0.2); }
.answer-reveal {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.82rem;
  color: var(--correct);
  display: none;
}
.answer-reveal.show { display: inline; }

.exam-actions {
  display: flex; gap: 1rem; justify-content: center;
  margin-top: 2.5rem; flex-wrap: wrap;
}
.btn-submit {
  background: linear-gradient(135deg, var(--accent), #d4a035);
  color: #0b0e1a;
  border: none;
  font-family: 'Source Serif 4', serif;
  font-size: 0.95rem; font-weight: 600;
  padding: 0.8rem 2rem;
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.2s;
}
.btn-submit:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(232,184,75,0.25); }
.btn-reset {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--muted);
  font-family: 'Source Serif 4', serif;
  font-size: 0.9rem;
  padding: 0.8rem 1.5rem;
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.2s;
}
.btn-reset:hover { border-color: var(--muted); color: var(--text); }

.result-banner {
  display: none;
  background: var(--card);
  border: 1px solid var(--accent);
  border-radius: 12px;
  padding: 1.5rem 2rem;
  text-align: center;
  margin-top: 2rem;
}
.result-banner.show { display: block; }
.result-banner h3 {
  font-family: 'Playfair Display', serif;
  font-size: 1.4rem; color: var(--accent);
  margin-bottom: 0.5rem;
}
.result-score {
  font-family: 'JetBrains Mono', monospace;
  font-size: 2.5rem; font-weight: 600;
  color: var(--text);
}
.result-sub { font-size: 0.85rem; color: var(--muted); margin-top: 0.3rem; }

.hidden { display: none !important; }

::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

@media (max-width: 600px) {
  .options { grid-template-columns: 1fr; }
  .exam-area { padding: 0 1rem 3rem; }
  .hero { padding: 2rem 1rem 1.5rem; }
  header { padding: 0 1rem; }
  .header-inner { gap: 0.75rem; }
  nav { display: none; }
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}
.exam-area > * { animation: fadeUp 0.35s ease both; }
/* Nút trở về trên cùng */
.btn-back {
    display: inline-block;
    margin-top: 5px;
    margin-bottom: 15px;
    padding: 10px 18px;
    background-color: #e2e8f0; /* Màu nền xám nhạt */
    color: #334155;            /* Màu chữ */
    text-decoration: none;
    border-radius: 8px;
    font-weight: bold;
    border: none;
    cursor: pointer;
    font-size: 0.9rem;
    transition: all 0.2s ease;
}

.btn-back:hover {
    background-color: #cbd5e1; /* Đổi màu khi chạm/di chuột vào */
    color: #1e40af;
}

</style>
</head>
<body>
<button onclick="history.back()" class="btn-back">⬅ Quay lại trang trước</button>

<header>
  <div class="header-inner">
    <div class="logo">TOÁN<span>THPT</span> 2026</div>
    <nav id="navBtns"></nav>
    <div class="score-badge" id="globalScore">0 / 0 câu</div>
  </div>
</header>

<div id="homePage">
  <div class="hero">
    <h1>Luyện Thi <em>Toán THPT</em><br>Bám Sát Cấu Trúc 2025</h1>
    <p>Đề thi gồm 3 phần: 12 câu trắc nghiệm (0,25đ/câu), 4 câu Đúng/Sai (đúng 1 ý: 0,1đ · 2 ý: 0,25đ · 3 ý: 0,5đ · 4 ý: 1đ), 6 câu trả lời ngắn (0,5đ/câu). Tổng 10 điểm.</p>
    <div class="de-grid" id="deGrid"></div>
  </div>
</div>

<div id="examPage" class="hidden">
  <div class="exam-area" id="examArea"></div>
</div>

<script>
// ==================== DỮ LIỆU ĐỀ THI (4 ĐỀ: 001, 002, 003, 004) ====================
const EXAM_DATA = [
// ĐỀ 001 (Bộ GD&ĐT tham khảo - giữ nguyên)
{
  id: "001",
  maDe: "101",
  ten: "Đề 1 – Thi Chính Thức Tham Khảo 2025",
  nguon: "Bộ GD&ĐT - Đề tham khảo TN THPT 2025",
  loai: "official",
  thoiGian: "90 phút",
  nam: "2025",
  phan1: [
    { q: "Cho hàm số y = x³ - 3x² + 2. Điểm cực đại của đồ thị hàm số có tọa độ là", opts: ["(0;2)","(2;-2)","(0;-2)","(2;2)"], ans: 0 },
    { q: "Trong không gian Oxyz, mặt cầu (S): x²+y²+z²−4x+2y−6z+5=0 có bán kính bằng", opts: ["3","5","√5","√15"], ans: 0 },
    { q: "Nghiệm của bất phương trình log₂(x-1) ≥ 3 là", opts: ["x ≥ 9","x ≥ 8","x > 9","x > 8"], ans: 0 },
    { q: "Cho ∫₀¹ f(x)dx = 2 và ∫₀³ f(x)dx = 5, khi đó ∫₁³ f(x)dx bằng", opts: ["3","7","-3","10"], ans: 0 },
    { q: "Số phức z = (2+i)(1-3i) có phần ảo bằng", opts: ["-5","5","-1","1"], ans: 0 },
    { q: "Thể tích khối tròn xoay sinh ra khi quay hình phẳng giới hạn bởi y = x², y = 0, x=0, x=2 quanh trục Ox là", opts: ["32π/5","16π/5","8π/3","4π"], ans: 0 },
    { q: "Hàm số y = e^{2x} có đạo hàm y' bằng", opts: ["2e^{2x}","e^{2x}","2xe^{2x-1}","e^{x}"], ans: 0 },
    { q: "Trong mặt phẳng tọa độ, tập hợp điểm biểu diễn số phức z thỏa |z - i| = 2 là đường tròn có bán kính", opts: ["2","1","4","√2"], ans: 0 },
    { q: "Cho hình chóp S.ABC có SA vuông góc đáy, tam giác ABC vuông tại B. Khoảng cách từ A đến (SBC) bằng", opts: ["SA·AB/√(SA²+AB²)","SA·AB/BC","SA·AC/AB","AB·AC/SA"], ans: 0 },
    { q: "Giới hạn lim (x→0) (ln(1+2x))/x bằng", opts: ["2","1","0","∞"], ans: 0 },
    { q: "Có bao nhiêu số tự nhiên có 3 chữ số đôi một khác nhau lập từ các chữ số 1,2,3,4,5?", opts: ["60","120","125","20"], ans: 0 },
    { q: "Đường tiệm cận đứng của đồ thị y = (2x+1)/(x-3) là", opts: ["x=3","x=-3","y=2","y=3"], ans: 0 }
  ],
  phan2: [
    { ctx: "Cho hàm số f(x) = x³ − 3x² + mx + 1 với m là tham số thực. Xét tính đúng/sai của các khẳng định sau:",
      items: [
        { text: "Khi m = 0: hàm số đạt cực đại tại x = 0 với f(0) = 1, đạt cực tiểu tại x = 2 với f(2) = −3", ans: true },
        { text: "Với mọi giá trị thực m, hàm số luôn có đúng hai điểm cực trị", ans: false },
        { text: "Có đúng hai giá trị m nguyên để hàm số có hai cực trị x₁, x₂ thỏa mãn x₁² + x₂² = 8", ans: false },
        { text: "Khi m = −3, phương trình f(x) = 0 có nghiệm kép tại x = −1", ans: true }
      ]
    },
    { ctx: "Trong không gian Oxyz, cho A(1; 2; 3), B(3; 2; 1) và mặt phẳng (P): 2x − y + 2z − 3 = 0.",
      items: [
        { text: "Khoảng cách từ A đến (P) bằng 5/3", ans: true },
        { text: "Trung điểm I(2; 2; 2) của AB nằm trên mặt phẳng (P)", ans: true },
        { text: "Đường thẳng AB vuông góc với mặt phẳng (P)", ans: false },
        { text: "Mặt phẳng (Q) song song (P) và đi qua B có phương trình 2x − y + 2z − 8 = 0", ans: true }
      ]
    },
    { ctx: "Số ca bệnh theo mô hình f(t) = 500·e^{0,3t} − 200·e^{0,1t} (ca), t ≥ 0 (tuần). f'(t) là tốc độ tăng ca mỗi tuần.",
      items: [
        { text: "Số ca bệnh tại thời điểm ban đầu t = 0 là 300 ca", ans: true },
        { text: "f'(t) = 150e^{0,3t} − 20e^{0,1t}, suy ra f đồng biến với mọi t ≥ 0", ans: true },
        { text: "Tốc độ tăng ca tại t = 0 là 130 ca/tuần", ans: true },
        { text: "Tại tuần thứ 10, số ca bệnh vượt quá 1 000 000 ca", ans: false }
      ]
    },
    { ctx: "Một hộp có 5 bi đỏ và 4 bi xanh. Lấy ngẫu nhiên đồng thời 3 viên bi.",
      items: [
        { text: "Xác suất lấy được đúng 2 bi đỏ là 10/21", ans: true },
        { text: "Xác suất lấy được ít nhất 1 bi xanh là 37/42", ans: false },
        { text: "Xác suất lấy được 3 bi cùng màu là 5/21", ans: false },
        { text: "Số cách lấy được ít nhất 2 bi đỏ là 46", ans: true }
      ]

let currentExam = null;
let answers = {};
let submitted = false;
let currentFilter = "all";

const TYPES = [
  { key: "all", label: "Tất cả" },
  { key: "official", label: "Bộ GD&ĐT" },
  { key: "so", label: "Sở GD&ĐT" },
  { key: "thu", label: "Trường Chuyên" }
];

function buildNav() {
  const nav = document.getElementById("navBtns");
  nav.innerHTML = "";
  TYPES.forEach(t => {
    const btn = document.createElement("button");
    btn.textContent = t.label;
    btn.dataset.type = t.key;
    btn.onclick = () => filterDe(t.key);
    nav.appendChild(btn);
  });
  document.querySelectorAll("nav button").forEach(btn => {
    btn.classList.toggle("active", btn.dataset.type === currentFilter);
  });
}

function filterDe(type) {
  currentFilter = type;
  document.querySelectorAll("nav button").forEach(btn => {
    btn.classList.toggle("active", btn.dataset.type === type);
  });
  const examPage = document.getElementById("examPage");
  const homePage = document.getElementById("homePage");
  if (!examPage.classList.contains("hidden")) {
    examPage.classList.add("hidden");
    homePage.classList.remove("hidden");
  }
  renderDeGrid(currentFilter);
}

function getProgress(exam) {
  if (!answers[exam.id]) return 0;
  const a = answers[exam.id];
  let total = exam.phan1.length + exam.phan2.length * 4 + exam.phan3.length;
  let done = Object.keys(a).length;
  return Math.min(100, Math.round(done / total * 100));
}

function renderDeGrid(filter = currentFilter) {
  const grid = document.getElementById("deGrid");
  grid.innerHTML = "";
  const list = filter === "all" ? EXAM_DATA : EXAM_DATA.filter(e => e.loai === filter);
  list.forEach((de, i) => {
    const prog = getProgress(de);
    const badgeClass = {official:"badge-official",so:"badge-so",thu:"badge-thu"}[de.loai];
    const badgeLabel = {official:"Bộ GD&ĐT",so:"Sở GD&ĐT",thu:"Trường Chuyên"}[de.loai];
    const card = document.createElement("div");
    card.className = "de-card";
    card.innerHTML = `
      <div class="de-card-num">MÃ ĐỀ ${de.maDe}</div>
      <div class="de-card-name">${de.ten}</div>
      <div class="de-card-meta">${de.nam} · ${de.thoiGian}</div>
      <span class="de-badge ${badgeClass}">${badgeLabel}</span>
      <div class="de-card-progress"><div class="de-card-progress-fill" style="width:${prog}%"></div></div>
    `;
    card.onclick = () => openExam(de.id);
    grid.appendChild(card);
  });
}

let examTimer = null;
let timeLeft = 0;

function openExam(id) {
  currentExam = EXAM_DATA.find(e => e.id === id);
  if (!answers[id]) answers[id] = {};
  submitted = false;
  document.getElementById("homePage").classList.add("hidden");
  document.getElementById("examPage").classList.remove("hidden");
  renderExam();
  startTimer(currentExam.thoiGian);
  window.scrollTo({ top: 0, behavior: "smooth" });
}

function startTimer(thoiGianStr) {
  if(examTimer) clearInterval(examTimer);
  // Parse "90 phút" hoặc "120 phút"
  const match = thoiGianStr.match(/(\d+)/);
  const minutes = match ? parseInt(match[1]) : 90;
  timeLeft = minutes * 60;
  updateTimerDisplay();
  examTimer = setInterval(() => {
    if(submitted) { clearInterval(examTimer); return; }
    timeLeft--;
    updateTimerDisplay();
    if(timeLeft <= 0) {
      clearInterval(examTimer);
      if(!submitted) { alert("⏰ Hết giờ! Bài được nộp tự động."); submitExam(); }
    }
  }, 1000);
}

function updateTimerDisplay() {
  const box = document.getElementById("timerBox");
  if(!box) return;
  const m = Math.floor(timeLeft / 60);
  const s = timeLeft % 60;
  const str = `⏱ ${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  box.textContent = str;
  if(timeLeft <= 300) box.style.color = "var(--wrong)"; // đỏ khi còn 5 phút
  else if(timeLeft <= 600) box.style.color = "var(--accent)"; // vàng khi còn 10 phút
  else box.style.color = "var(--accent2)";
}
function goHome() {
  if(examTimer) clearInterval(examTimer); // thêm dòng này
  document.getElementById("examPage").classList.add("hidden");2025
  document.getElementById("examPage").classList.add("hidden");
  document.getElementById("homePage").classList.remove("hidden");
  renderDeGrid(currentFilter);
  document.querySelectorAll("nav button").forEach(btn => {
    btn.classList.toggle("active", btn.dataset.type === currentFilter);
  });
  window.scrollTo({ top: 0 });
}

  const ex = currentExam;

    <div id="timerBox" style="margin-top:0.8rem;font-family:'JetBrains Mono',monospace;font-size:1.1rem;color:var(--accent2);background:rgba(75,158,232,0.1);border:1px solid rgba(75,158,232,0.3);display:inline-block;padding:0.3rem 1.2rem;border-radius:8px;">⏱ Đang tải...</div>

  const actions = document.createElement("div");

  actions.innerHTML = `<button class="btn-submit" onclick="submitExam()">Nộp bài & Xem đáp án</button>
                     <button class="btn-reset" onclick="goHome()">← Chọn đề khác</button>`;
  area.appendChild(actions);

function makePhanHeader(num, title, desc) {
  const div = document.createElement("div"); div.className = "phan-header";
  div.innerHTML = `<div class="phan-line"></div><span class="phan-num">${num}</span><div><div class="phan-title">${title}</div><div class="phan-desc">${desc}</div></div><div class="phan-line"></div>`;
  return div;
}

function makeTNBlock(qi, q) {
  const div = document.createElement("div"); div.className = "question-block"; div.id = `tn_${qi}`;
  const letters = ["A","B","C","D"]; const aKey = `tn_${qi}`; const userAns = answers[currentExam.id][aKey];
  let optsHtml = q.opts.map((opt, i) => `<div class="option ${userAns===i?'selected':''}" onclick="selectTN(${qi},${i})"><span class="option-letter">${letters[i]}</span><span>${opt}</span></div>`).join("");
  div.innerHTML = `<div class="q-num">CÂU ${qi+1}</div><div class="q-text">${q.q}</div><div class="options">${optsHtml}</div>`;
  return div;
}
function selectTN(qi, oi) { if(submitted) return; answers[currentExam.id][`tn_${qi}`] = oi; renderExam(); updateScore(); }
function makeDSBlock(qi, q) {
  const div = document.createElement("div"); div.className = "question-block"; div.id = `ds_${qi}`;
  let itemsHtml = q.items.map((item, ii) => {
    const key = `ds_${qi}_${ii}`; const sel = answers[currentExam.id][key];
    const truCls = sel===true ? "true-sel" : ""; const falCls = sel===false ? "false-sel" : "";
    return `<div class="ds-row"><div class="ds-text">ý ${ii+1}. ${item.text}</div><div class="ds-btns"><button class="ds-btn ${truCls}" onclick="selectDS(${qi},${ii},true)">Đ</button><button class="ds-btn ${falCls}" onclick="selectDS(${qi},${ii},false)">S</button></div></div>${ii<q.items.length-1?'<div class="ds-sep"></div>':''}`;
  }).join("");
  div.innerHTML = `<div class="q-num">CÂU ${qi+13}</div><div class="q-text">${q.ctx}</div>${itemsHtml}`;
  return div;
}
function selectDS(qi, ii, val) { if(submitted) return; answers[currentExam.id][`ds_${qi}_${ii}`] = val; renderExam(); updateScore(); }
function makeShortBlock(qi, q) {
  const div = document.createElement("div"); div.className = "question-block"; div.id = `sh_${qi}`;
  const saved = answers[currentExam.id][`sh_${qi}`] || "";
  div.innerHTML = `<div class="q-num">CÂU ${qi+17}</div><div class="q-text">${q.q}</div><div class="short-answer-wrap"><input type="text" class="short-input" id="sh_input_${qi}" placeholder="Nhập đáp án..." value="${saved}" oninput="saveShort(${qi})"><button class="check-btn" onclick="checkShort(${qi})">Kiểm tra</button><span class="answer-reveal" id="sh_reveal_${qi}">Đáp án: <strong>${q.ans}</strong></span></div>`;
  return div;
}
function saveShort(qi) { if(submitted) return; const val = document.getElementById(`sh_input_${qi}`).value; answers[currentExam.id][`sh_${qi}`] = val; updateScore(); }
function checkShort(qi) {
  const q = currentExam.phan3[qi]; const input = document.getElementById(`sh_input_${qi}`); const reveal = document.getElementById(`sh_reveal_${qi}`);
  if(input.value.trim().toLowerCase() === q.ans.toString().toLowerCase()) input.className = "short-input correct-input";
  else { input.className = "short-input wrong-input"; reveal.className = "answer-reveal show"; }
}
function updateScore() {
  if(!currentExam) return;
  const a = answers[currentExam.id] || {};
  let totalAnswered = Object.keys(a).length;
  let totalItems = currentExam.phan1.length + currentExam.phan2.length*4 + currentExam.phan3.length;
  document.getElementById("globalScore").textContent = `Đã làm ${totalAnswered} / ${totalItems} câu`;
}
function submitExam() {
  submitted = true;
  const ex = currentExam; const a = answers[ex.id] || {};
  let score = 0;

  // Tính điểm & highlight đáp án TN
  ex.phan1.forEach((q, qi) => {
    if(a[`tn_${qi}`] === q.ans) score += 0.25;
    const block = document.getElementById(`tn_${qi}`);
    if(!block) return;
    block.querySelectorAll(".option").forEach((el, i) => {
      el.classList.remove("selected","correct","incorrect");
      if(i === q.ans) el.classList.add("correct");
      else if(i === a[`tn_${qi}`] && i !== q.ans) el.classList.add("incorrect");
    });
  });

  // Tính điểm & highlight đáp án Đúng/Sai
  ex.phan2.forEach((q, qi) => {
    let correct = 0;
    q.items.forEach((item, ii) => { if(a[`ds_${qi}_${ii}`] === item.ans) correct++; });
    if(correct === 1) score += 0.1;
    else if(correct === 2) score += 0.25;
    else if(correct === 3) score += 0.5;
    else if(correct === 4) score += 1.0;
    const block = document.getElementById(`ds_${qi}`);
    if(!block) return;
    q.items.forEach((item, ii) => {
      const btns = block.querySelectorAll(`.ds-row:nth-child(${ii*2+1}) .ds-btn`);
      if(!btns.length) return;
      btns[0].classList.remove("true-sel","reveal-correct","reveal-wrong");
      btns[1].classList.remove("false-sel","reveal-correct","reveal-wrong");
      if(item.ans === true) { btns[0].classList.add("reveal-correct"); btns[1].classList.add("reveal-wrong"); }
      else { btns[1].classList.add("reveal-correct"); btns[0].classList.add("reveal-wrong"); }
    });
  });

  // Tính điểm TLN
  ex.phan3.forEach((q, qi) => {
    let user = (a[`sh_${qi}`] || "").toString().trim().toLowerCase();
    if(user === q.ans.toString().toLowerCase()) score += 0.5;
    const inp = document.getElementById(`sh_input_${qi}`);
    if(inp) inp.disabled = true;
    const reveal = document.getElementById(`sh_reveal_${qi}`);
    if(reveal) reveal.className = "answer-reveal show";
  });

  const banner = document.getElementById("resultBanner");
  banner.className = "result-banner show";
  const grade = score>=8 ? "🏆 Xuất sắc" : score>=6.5 ? "🎯 Khá" : score>=5 ? "📘 Trung bình" : "📚 Cần cố gắng";
  banner.innerHTML = `<h3>${grade}</h3><div class="result-score">${score.toFixed(2)} / 10</div><div class="result-sub">Mã đề ${ex.maDe} — ${ex.ten}</div>`;
  document.getElementById("globalScore").textContent = `${score.toFixed(2)} / 10 điểm`;
  banner.scrollIntoView({ behavior: "smooth", block: "center" });
};
function resetExam() { answers[currentExam.id] = {}; submitted = false; renderExam(); document.getElementById("globalScore").textContent = `Đã làm 0 / ${currentExam.phan1.length + currentExam.phan2.length*4 + currentExam.phan3.length} câu`; window.scrollTo({top:0}); }

buildNav(); renderDeGrid();
</script>
